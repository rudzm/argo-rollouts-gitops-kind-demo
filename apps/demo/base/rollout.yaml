apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-app
  namespace: demo
spec:
  replicas: 4
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: argo-rollouts-demo:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_NAME
              value: argo-rollouts-demo
            - name: VERSION
              value: v1
            - name: COLOR
              value: blue
            - name: ERROR_RATE
              value: "0.00"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
  strategy:
    canary:
      stableService: demo-stable
      canaryService: demo-canary
      scaleDownDelaySeconds: 30
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: demo-route
            namespace: demo
      steps:
        - setWeight: 10
        - pause: {duration: 20s}
        - setWeight: 25
        - pause: {duration: 20s}
        - analysis:
            templates:
              - templateName: demo-success-rate
        - setWeight: 50
        - pause: {}
        - setWeight: 100
        - pause: {duration: 10s}
